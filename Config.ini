[Settings]
; ============================================================================
; ОСНОВНЫЕ ПАРАМЕТРЫ МОНИТОРИНГА
; ============================================================================

; SourceFolder - Локальная папка, которую нужно мониторить на наличие новых файлов
; Укажите полный путь к папке. Пример: C:\MonitorFolder\ или D:\Files\Incoming\
; ВАЖНО: Папка должна существовать или будет создана автоматически
SourceFolder=C:\MonitorFolder\

; DestinationFolder - Сетевой путь (UNC) или локальный путь, куда копируются файлы
; Формат для сетевого пути: \\server\share\TargetFolder\
; Формат для локального пути: C:\Backup\Files\
; ВАЖНО: Убедитесь, что у пользователя есть права на запись в эту папку
DestinationFolder=\\server\share\TargetFolder\

; ============================================================================
; ПАРАМЕТРЫ АУТЕНТИФИКАЦИИ ДЛЯ СЕТЕВОГО ДИСКА
; ============================================================================

; Username - Имя пользователя для подключения к сетевому диску
; Формат: DOMAIN\username или просто username (для локального пользователя)
; Если оставить пустым, будет использоваться текущий пользователь Windows
; Пример: DOMAIN\john.doe или WORKGROUP\admin
Username=DOMAIN\username

; Password - Пароль для подключения к сетевому диску
; Если Username указан, то Password обязателен
; Если оставить пустым и Username не указан, будет использоваться текущая сессия пользователя
; ВАЖНО: Храните этот файл в безопасном месте, так как пароль хранится в открытом виде
Password=userpassword

; ============================================================================
; ПАРАМЕТРЫ РАБОТЫ МОНИТОРИНГА
; ============================================================================

; CheckInterval - Интервал проверки папки на новые файлы (в миллисекундах)
; Рекомендуемые значения: 5000 (5 сек) - 60000 (1 мин)
; Меньшие значения увеличивают нагрузку на систему, большие - задержку обработки
; Пример: 5000 = проверка каждые 5 секунд, 10000 = каждые 10 секунд
CheckInterval=5000

; MaxQueueSize - Максимальное количество файлов в очереди перед уведомлением администратора
; Когда в очереди накапливается больше этого количества файлов, отправляется уведомление
; Рекомендуемые значения: 10-50 файлов
; Это указывает на проблему с сетевым диском или слишком быстрый поток файлов
MaxQueueSize=20

; MaxRetryCount - Максимальное количество попыток копирования файла при ошибке
; Если файл не удалось скопировать или хэши не совпали, будет сделано столько попыток
; Рекомендуемые значения: 3-5 попыток
; После исчерпания попыток файл остается в очереди для следующей итерации
MaxRetryCount=4

; NetworkDriveWaitInterval - Интервал ожидания при недоступности сетевого диска (в миллисекундах)
; Когда сетевой диск недоступен, скрипт ждет это время перед следующей проверкой
; Рекомендуемые значения: 5000 (5 сек) - 30000 (30 сек)
; Меньшие значения быстрее обнаружат восстановление связи, но увеличат нагрузку
NetworkDriveWaitInterval=5000

; RetryWaitInterval - Интервал ожидания между повторными попытками копирования (в миллисекундах)
; При ошибке копирования или несовпадении хэша скрипт ждет это время перед следующей попыткой
; Рекомендуемые значения: 1000 (1 сек) - 5000 (5 сек)
; Дает время на устранение временных проблем с сетью или диском
RetryWaitInterval=2000

; FileStabilizationMs - Сколько миллисекунд файл должен быть неизменным (размер/дата)
; прежде чем его начнут копировать. Решает проблему, когда файл "дописывается"
; после появления в папке (не нужен хэш, нагрузка минимальная).
FileStabilizationMs=2000

; ============================================================================
; ПАРАМЕТРЫ УВЕДОМЛЕНИЙ
; ============================================================================

; AdminEmail - Email адрес администратора для отправки уведомлений
; На этот адрес будут отправляться уведомления о проблемах:
; - Сетевой диск недоступен
; - В очереди накопилось больше MaxQueueSize файлов
; Если оставить пустым, email уведомления отключаются (только лог-файл)
; Пример: admin@company.com или support@example.org
AdminEmail=admin@company.com

; LogFile - Path to log file for recording all events and notifications
; Can be relative (relative to script folder) or absolute
; Relative path: FileMonitor.log (will be created in script folder)
; Absolute path: C:\Logs\FileMonitor.log
; IMPORTANT: Make sure script has write permissions to the specified folder
LogFile=C:\Logs\FileMonitor.log

; LogRetentionDays - Number of days to keep log files (default: 14)
; Log files older than this will be automatically deleted
; Set to 0 to disable log rotation
LogRetentionDays=14

; UseRobocopy - Использовать robocopy для копирования (1=да, 0=нет)
; Robocopy устойчивее для сетевых путей и поддерживает ретраи.
UseRobocopy=1

; RobocopyRetries - Количество повторов robocopy при ошибке (/R)
RobocopyRetries=3

; RobocopyWaitSeconds - Ожидание между повторами robocopy (/W) в секундах
RobocopyWaitSeconds=2

; ============================================================================
; ПАРАМЕТРЫ SMTP ДЛЯ ОТПРАВКИ EMAIL
; ============================================================================

; SMTPServer - Адрес SMTP сервера для отправки email уведомлений
; Может быть доменным именем (smtp.company.com) или IP адресом (192.168.1.100)
; Если оставить пустым, email уведомления отключаются
; Примеры: smtp.gmail.com, smtp.mail.ru, mail.company.local
SMTPServer=smtp.company.com

; SMTPPort - Порт SMTP сервера
; Стандартные порты:
;   25  - обычный SMTP (без шифрования)
;   587 - SMTP с TLS (рекомендуется для большинства серверов)
;   465 - SMTP с SSL (используется некоторыми провайдерами)
; Уточните у вашего почтового администратора правильный порт
SMTPPort=25

; SMTPUser - Имя пользователя для аутентификации на SMTP сервере
; Требуется, если SMTP сервер требует аутентификацию
; Обычно это email адрес или имя пользователя
; Если оставить пустым, аутентификация не используется (для внутренних серверов)
; Пример: user@company.com или просто username
SMTPUser=

; SMTPPassword - Пароль для аутентификации на SMTP сервере
; Обязателен, если указан SMTPUser
; Если оставить пустым и SMTPUser указан, отправка email может не работать
; ВАЖНО: Храните этот файл в безопасном месте, так как пароль хранится в открытом виде
SMTPPassword=

; SMTPFrom - Email адрес отправителя уведомлений
; Этот адрес будет указан в поле "От" в письмах
; Может совпадать с SMTPUser или быть другим (если сервер это разрешает)
; Пример: FileMonitor@company.com или noreply@company.com
SMTPFrom=FileMonitor@company.com

; SMTPConnectionTimeout - Таймаут подключения к SMTP серверу (в секундах)
; Время ожидания установления соединения с SMTP сервером
; Рекомендуемые значения: 5-30 секунд
; Если сервер медленный или недоступен, увеличьте это значение
; При таймауте отправка email будет пропущена, но скрипт продолжит работу
SMTPConnectionTimeout=10

; ============================================================================
; ПАРАМЕТРЫ HTTP УВЕДОМЛЕНИЙ (Telegram, Slack, Webhook)
; ============================================================================

; HttpNotificationUrl - URL для отправки HTTP уведомлений
; Поддерживаются: Telegram Bot API, Slack Webhook, Mattermost, generic webhook
; Примеры:
;   Telegram: https://api.telegram.org/bot<TOKEN>/sendMessage (указать TelegramToken и TelegramChatId)
;   Slack: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
;   Mattermost: https://mattermost.company.com/hooks/xxxxx
;   Generic: https://api.company.com/webhook/notifications
; Если оставить пустым, HTTP уведомления отключаются
HttpNotificationUrl=

; HttpNotificationType - Тип HTTP уведомления
; Возможные значения: telegram, slack, mattermost, webhook
; По умолчанию: webhook (generic webhook)
HttpNotificationType=webhook

; HttpProxy - Прокси сервер для HTTP запросов (если требуется)
; Формат: http://proxy.server.com:8080 или socks5://proxy.server.com:1080
; Если оставить пустым, прокси не используется
; ВАЖНО: WinHTTP поддерживает HTTP и SOCKS5 прокси
HttpProxy=

; HttpProxyUser - Имя пользователя для прокси (если требуется аутентификация)
HttpProxyUser=

; HttpProxyPassword - Пароль для прокси (если требуется аутентификация)
HttpProxyPassword=

; HttpTimeout - Таймаут HTTP запроса в секундах (по умолчанию 30)
HttpTimeout=30

; HttpMethod - HTTP метод для отправки (GET или POST, по умолчанию POST)
HttpMethod=POST

; HttpContentType - Content-Type заголовок (по умолчанию application/json)
; Примеры: application/json, application/x-www-form-urlencoded, text/plain
HttpContentType=application/json

; HttpApiKey - API ключ для авторизации (если требуется)
; Будет отправлен в заголовке, указанном в HttpApiKeyHeader
HttpApiKey=

; HttpApiKeyHeader - Имя заголовка для API ключа (по умолчанию X-API-Key)
HttpApiKeyHeader=X-API-Key

; HttpAuthHeader - Полный заголовок Authorization (если требуется)
; Пример: Bearer token123 или Basic base64encoded
; Если указан, HttpApiKey игнорируется
HttpAuthHeader=

; ============================================================================
; ПАРАМЕТРЫ TELEGRAM (если HttpNotificationType=telegram)
; ============================================================================

; TelegramToken - Токен Telegram бота (получить у @BotFather)
; Формат: 123456789:ABCdefGHIjklMNOpqrsTUVwxyz
TelegramToken=

; TelegramChatId - ID чата или канала для отправки сообщений
; Для личных сообщений: ваш user ID (узнать у @userinfobot)
; Для каналов: @channelname или -1001234567890
TelegramChatId=

; ============================================================================
; ПАРАМЕТРЫ SLACK (если HttpNotificationType=slack)
; ============================================================================

; SlackChannel - Канал Slack для отправки (опционально, по умолчанию канал из webhook)
SlackChannel=

; SlackUsername - Имя бота в Slack (по умолчанию FileMonitor)
SlackUsername=FileMonitor
